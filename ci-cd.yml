name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  release:
    types: [ created ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17

      - name: Build & Test Maven
        run: mvn clean install

  deploy-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image for Dev
        run: docker build -t mydockerhubuser/bank-app:dev .

      - name: Run Docker container for Dev
        run: docker run -d -p 8080:8080 --name bank-app-dev mydockerhubuser/bank-app:dev

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image for Staging
        run: docker build -t mydockerhubuser/bank-app:staging .

      - name: Push Docker image
        run: docker push mydockerhubuser/bank-app:staging

      - name: Deploy to Staging server
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "
          docker pull mydockerhubuser/bank-app:staging &&
          docker stop bank-app || true &&
          docker rm bank-app || true &&
          docker run -d --name bank-app -p 8080:8080 mydockerhubuser/bank-app:staging
          "

  deploy-prod:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image for Prod
        run: docker build -t mydockerhubuser/bank-app:prod .

      - name: Push Docker image
        run: docker push mydockerhubuser/bank-app:prod

      - name: Deploy to Production server
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "
          docker pull mydockerhubuser/bank-app:prod &&
          docker stop bank-app || true &&
          docker rm bank-app || true &&
          docker run -d --name bank-app -p 8080:8080 mydockerhubuser/bank-app:prod
          "